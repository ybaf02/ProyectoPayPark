<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayPark - Registro</title>

<style>
:root{
    --bg-main: linear-gradient(135deg,#e5e7eb,#f9fafb);
    --panel-bg: linear-gradient(180deg,#ffffff,#f3f4f6);
    --text-color: #111827;
    --header-bg: #1f2937;
    --accent-color: #0f79ab;
}

body.dark{
    --bg-main: linear-gradient(135deg,#111827,#1f2937);
    --panel-bg: linear-gradient(180deg,#1f2937,#111827);
    --text-color: #f3f4f6;
    --header-bg: #111827;
}

*{margin:0; padding:0; box-sizing:border-box;}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-main);
    background-size: 400% 400%;
    animation: gradientBG 30s ease infinite;
    color:var(--text-color);
    display:flex;
    flex-direction:column;
    min-height:100vh;
    transition:0.3s;
}

/* ANIMACIÓN FONDO */
@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* HEADER */
header{
    background: linear-gradient(90deg,#0f79ab,#3e6696);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    position:relative;
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
    transition:0.5s;
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:15px;
    font-size:2em;
    font-weight:bold;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
}

.logo img{
    height:100px;
    width:auto;
    border-radius:20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.3s;
    animation: floatLogo 3s ease-in-out infinite;
}

.logo img:hover{
    transform: scale(1.1) rotate(-5deg);
}

@keyframes floatLogo {
    0%,100% { transform: translateY(0) rotate(0deg);}
    50% { transform: translateY(-10px) rotate(-3deg);}
}

/* MENU */
.hamburger{
    display:flex;
    flex-direction:column;
    cursor:pointer;
    gap:5px;
}

.hamburger div{
    width:30px;
    height:4px;
    background:white;
    border-radius:2px;
}

nav.menu{
    display:none;
    position:absolute;
    top:80px;
    right:40px;
    background: var(--panel-bg);
    border-radius:15px;
    min-width:220px;
    box-shadow:0 6px 20px rgba(0,0,0,0.35);
    flex-direction:column;
    z-index:10;
    opacity:0;
    transform: translateY(-10px);
    transition: all 0.3s ease;
}

nav.menu.show{
    display:flex;
    opacity:1;
    transform: translateY(0);
}

nav.menu a{
    color:var(--text-color);
    padding:12px 20px;
    text-decoration:none;
    font-size:15px;
    font-weight:500;
    transition:0.3s;
    border-radius:8px;
}

nav.menu a:hover{
    background: rgba(15,121,171,0.15);
    transform: scale(1.05);
}

/* BOTÓN MODO OSCURO */
#themeToggle{
    position:fixed;
    top:15px;
    right:15px;
    font-size:25px;
    cursor:pointer;
    user-select:none;
    z-index:1000;
    transition:0.3s;
}

#themeToggle:hover{
    color:#60a5fa;
}

/* MAIN / PANEL */
main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px 20px;
}

.panel{
    background:var(--panel-bg);
    padding:50px 40px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    width:100%;
    max-width:500px;
    text-align:center;
    transition:0.5s;
    border: 3px solid;
    border-image-slice: 1;
    border-width: 3px;
    border-image-source: linear-gradient(90deg,#0f79ab,#3e6696,#60a5fa);
    animation: borderAnim 5s linear infinite;
}

@keyframes borderAnim {
    0% { border-image-source: linear-gradient(90deg,#0f79ab,#3e6696,#60a5fa);}
    50% { border-image-source: linear-gradient(90deg,#3e6696,#60a5fa,#0f79ab);}
    100% { border-image-source: linear-gradient(90deg,#0f79ab,#3e6696,#60a5fa);}
}

.panel h2{
    margin-bottom:20px;
    font-size:2em;
    color:var(--accent-color);
    text-shadow:1px 1px 3px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:15px;
    margin-bottom:15px;
    transition:0.3s;
}

input:focus{
    border-color:var(--accent-color);
    box-shadow:0 0 8px rgba(15,121,171,0.5);
    outline:none;
}

/* BOTONES UNIFORMES */
.btn{
    padding:12px 25px;
    border-radius:12px;
    text-decoration:none;
    font-size:14px;
    font-weight:500;
    transition:0.3s;
    cursor:pointer;
    display:inline-block;
    min-width:140px;
    margin:5px auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Botón principal y secundario iguales */
.btn-primary, .btn-secondary{
    background:linear-gradient(90deg,#0f79ab,#3e6696);
    color:white;
    font-weight:600;
    border:2px solid #0f79ab;
}

.btn-primary:hover, .btn-secondary:hover{
    background:linear-gradient(90deg,#5c7b89,#60a5fa);
    transform:translateY(-2px) scale(1.05);
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

/* MENSAJE */
.message{
    margin-top:15px;
    font-weight:600;
    color:#e61212;
}
</style>
</head>

<body>

<header>
<div class="logo">
    <img src="logo.png" alt="Logo PayPark">
</div>

<div class="hamburger" onclick="toggleMenu()">
    <div></div><div></div><div></div>
</div>

<nav class="menu" id="menuRegistro">
    <a href="index.html">Inicio</a>
    <a href="login.html">Login</a>
    <a href="panel_usuario.html">Panel Usuario</a>
    <a href="panel_admin.html">Panel Admin</a>
</nav>
</header>

<div id="themeToggle">🌙</div>

<main>
<div class="panel">
<h2>Registro de Usuario</h2>

<input type="text" placeholder="Nombre completo" id="nombre">
<input type="email" placeholder="Correo electrónico" id="email">
<input type="password" placeholder="Contraseña" id="password">
<input type="date" placeholder="Fecha de nacimiento" id="fecha">

<div style="margin-top:15px;">
    <button class="btn btn-primary" onclick="registrar()">Registrarse</button>
    <button class="btn btn-secondary" onclick="window.location.href='index.html'">Cancelar</button>
</div>

<p class="message" id="mensaje"></p>
</div>
</main>

<script>
function toggleMenu(){
    document.getElementById('menuRegistro').classList.toggle('show');
}

window.onclick=function(event){
    const menu=document.getElementById('menuRegistro');
    const hamburger=document.querySelector('.hamburger');
    if(!menu.contains(event.target)&&!hamburger.contains(event.target)){
        menu.classList.remove('show');
    }
}

function registrar(){
    const nombre=document.getElementById('nombre').value;
    const email=document.getElementById('email').value;
    const password=document.getElementById('password').value;
    const fecha=document.getElementById('fecha').value;

    if(nombre && email && password && fecha){
        const fechaParts = fecha.split('-');
        const fechaFormateada = `${fechaParts[2]}/${fechaParts[1]}/${fechaParts[0]}`;
        document.getElementById('mensaje').textContent =
        `¡Usuario ${nombre} registrado correctamente! Fecha: ${fechaFormateada}`;
    }else{
        document.getElementById('mensaje').textContent = 'Completa todos los campos';
    }
}

// Toggle modo oscuro / claro
const themeToggle=document.getElementById('themeToggle');
themeToggle.addEventListener('click',()=> {
    document.body.classList.toggle('dark');
    themeToggle.textContent =
    document.body.classList.contains('dark') ? '☀️' : '🌙';
});
</script>

</body>
</html>
